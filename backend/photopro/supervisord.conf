[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:migrate]
command=python migrate.py
autostart=true
autorestart=false
startsecs=0
priority=1

[program:api]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
startsecs=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ftp]
command=python ftp_server.py
autostart=true
autorestart=true
startsecs=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
