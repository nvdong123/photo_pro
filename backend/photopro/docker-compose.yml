services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets:ro
      - photopro_upload:/photopro_upload
    command: sh -c "python migrate.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./assets:/app/assets:ro
      - photopro_upload:/photopro_upload
    command: >
      celery -A app.workers.media_worker worker
      -Q media,cleanup
      --concurrency=4
      --loglevel=info
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: >
      celery -A app.workers.media_worker beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: photopro
      POSTGRES_USER: photopro
      POSTGRES_PASSWORD: photopro_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "photopro"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  face-recognition:
    build: ../services/face-recognition
    ports:
      - "8001:8001"
    env_file: .env.face-recognition
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ftp:
    build:
      context: .
      dockerfile: Dockerfile
    command: python ftp_server.py
    restart: unless-stopped
    ports:
      - "21:21"
      - "21000-21099:21000-21099"
    volumes:
      - photopro_upload:/photopro_upload
    env_file: .env
    environment:
      - FTP_PUBLIC_IP=${FTP_PUBLIC_IP}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',21),2)"]
      interval: 30s
      timeout: 5s
      retries: 3
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  photopro_upload:
